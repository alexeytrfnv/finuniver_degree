services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: embedding_service
    ports:
      - "8000:8000"
    command: >
      sh -c "uvicorn src.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - "../.env"
    volumes:
      - "..:/app/"
    networks:
      - shared-network

    # --- ВАЖНО ---
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    # Работает для docker compose standalone:
    # gpus: all
    # --- /ВАЖНО ---

networks:
  shared-network:
    driver: bridge
    name: ai-shared-network
