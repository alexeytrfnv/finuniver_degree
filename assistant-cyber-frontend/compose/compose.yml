services:
  frontend:
    build: ..
    ports:
      - "5173:5173"
    environment:
      - NEXT_PUBLIC_OLLAMA_BASE_URL=http://s00-0000-ai29.sogaz.ru:11434/api/tags #${OLLAMA_BASE_URL}
      - NEXT_PUBLIC_BACKEND_URL=http://s00-0000-ai29.sogaz.ru:8888 #${BACKEND_URL}
    #depends_on:
    #  - ai_app
    networks:
      - shared-network
  nginx:
    image: nexus.sogaz.ru/nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    #depends_on:
    #  - ai_app
    networks:
      - shared-network

networks:
  shared-network:
    driver: bridge
    name: ai-shared-network
