
services:
  qdrant:
    image: nexus.sogaz.ru/qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
    volumes:
      - qdrant_data:/qdrant/storage
      - ./config:/qdrant/config
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
      - QDRANT__LOG_LEVEL=INFO
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    # depends_on:
    #   - postgres
    networks:
      - shared-engine-network
  redis:
    image: nexus.sogaz.ru/redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - shared-engine-network
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
            uvicorn src.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - "../.env"
    volumes:
      - "..:/app/"
    networks:
      - shared-engine-network

volumes:
  qdrant_data:
  redis_data:

networks:
  shared-engine-network:
    driver: bridge
    name: engine-shared-network
    